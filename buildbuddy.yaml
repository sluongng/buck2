actions:
  - name: Buck2 Stack Test
    container_image: ubuntu-24.04
    resource_requests:
      disk: 27GB
    triggers:
      push:
        branches:
          - "main"
    steps:
      - run: |
          set -euo pipefail

          : "${BUILDBUDDY_API_KEY:?Set the BuildBuddy workflow secret BUILDBUDDY_API_KEY}"
          export DEBIAN_FRONTEND=noninteractive

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            curl \
            git \
            libssl-dev \
            libzstd-dev \
            lld \
            pkg-config \
            python3

          rust_toolchain=$(python3 - <<'PY'
          from pathlib import Path

          for line in Path("rust-toolchain").read_text().splitlines():
              line = line.strip()
              if line.startswith("channel"):
                  print(line.split("=", 1)[1].strip().strip('"'))
                  break
          else:
              raise SystemExit("rust-toolchain channel not found")
          PY
          )

          if [ ! -x "$HOME/.cargo/bin/rustup" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain "$rust_toolchain"
          fi
          . "$HOME/.cargo/env"
          rustup toolchain install "$rust_toolchain"
          rustup default "$rust_toolchain"

          cargo build --bin=buck2

          cat > .buckconfig.local <<EOF
          <file:.buckconfig.buildbuddy>

          [buck2]
          file_watcher = none

          [buck2_re_client]
          http_headers = x-buildbuddy-api-key:$BUILDBUDDY_API_KEY

          [bes]
          header = x-buildbuddy-api-key=$BUILDBUDDY_API_KEY
          EOF

          buildbuddy/run_buck2_test_matrix.sh \
            --mode both \
            --matrix app-rust \
            --buck2 target/debug/buck2 \
            --clean-output
